<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#ffffff" />
    <meta name="description" content="以視覺化介面建立 Novae 提案分類設定，並下載 issue-categories.config.json。" />
    <title>分類設定產生器｜Novae</title>
    <script type="module" src="/src/category-builder.js"></script>
  </head>
  <body class="builder-page">
    <a class="skip-link" href="#builder-main">跳到設定產生器</a>
    <header class="site-header builder-header">
      <a class="brand" href="./" aria-label="Novae 首頁"><span class="brand-mark"><img src="./logo.svg" alt="" /></span></a>
      <nav aria-label="主要導覽"><a href="./">首頁</a><a href="./docs/">文件</a><a class="is-active" href="./category-builder.html">設定產生器</a></nav>
      <a class="button button-small button-dark" href="./docs/configuration.html">設定文件 <i class="ti ti-arrow-right" aria-hidden="true"></i></a>
    </header>

    <main id="builder-main" class="builder-app" data-category-builder>
      <header class="builder-commandbar">
        <div class="builder-commandbar__title">
          <a href="./#custom"><i class="ti ti-arrow-left" aria-hidden="true"></i><span>返回介紹</span></a>
          <div><h1>分類設定產生器</h1><code>config/issue-categories.config.json</code></div>
          <span class="builder-status" data-validity-badge>草稿</span>
        </div>
        <div class="builder-commandbar__actions">
          <label class="button button-secondary builder-import"><i class="ti ti-file-upload" aria-hidden="true"></i>開啟 JSON<input type="file" accept="application/json,.json" data-import-config /></label>
          <button class="button button-dark" type="button" data-download-config><i class="ti ti-download" aria-hidden="true"></i>下載 JSON</button>
        </div>
      </header>
      <p class="builder-message" data-builder-message>設定只在目前瀏覽器中處理，不會自動寫入專案。</p>

      <div class="builder-layout">
        <aside class="builder-sidebar" aria-label="分類清單">
          <div class="builder-sidebar__head"><div><h2>分類</h2><span data-category-count>1</span></div><button type="button" data-add-category aria-label="新增分類"><i class="ti ti-plus" aria-hidden="true"></i></button></div>
          <div class="builder-category-list" data-category-list></div>
          <div class="builder-sidebar__help">
            <strong><i class="ti ti-lock" aria-hidden="true"></i>固定規則</strong>
            <p>所有分類都需要校內 Google 帳號登入；附件與留言權限會依閱讀範圍自動套用。</p>
            <a href="./docs/configuration.html">查看設定文件 <i class="ti ti-arrow-right" aria-hidden="true"></i></a>
          </div>
        </aside>

        <section class="builder-detail">
          <nav class="builder-view-tabs" aria-label="編輯模式">
            <button class="active" type="button" data-editor-tab="form" aria-selected="true"><i class="ti ti-adjustments-horizontal" aria-hidden="true"></i>視覺化設定</button>
            <button type="button" data-editor-tab="source" aria-selected="false"><i class="ti ti-code" aria-hidden="true"></i>JSON 預覽</button>
          </nav>

          <div data-editor-panel="form">
            <section class="builder-editor" data-category-editor aria-live="polite"></section>
          </div>

          <div data-editor-panel="source" hidden>
            <div class="builder-source">
              <header><div><p>GENERATED SOURCE</p><h2>issue-categories.config.json</h2></div><span data-file-status>1 個分類</span></header>
              <section class="builder-validation" data-validation-summary hidden><h3>設定還不能下載</h3><p>請先修正以下項目：</p><div data-error-list></div></section>
              <pre><code data-json-preview></code></pre>
            </div>
          </div>
        </section>
      </div>
    </main>
  </body>
</html>
