name: Reset Supabase Database

on:
  workflow_dispatch:

concurrency:
  group: reset-db-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  reset_db:
    runs-on: ubuntu-latest
    environment: ${{ github.ref_name == 'main' && 'production' || 'development' }}
    steps:
      - uses: actions/checkout@v6

      - uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Link Supabase project
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
          SUPABASE_PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF }}
        run: supabase link --project-ref "$SUPABASE_PROJECT_REF"

      - name: Reset remote database
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
        run: supabase db reset --linked --yes

      - name: Restore maintenance runtime settings
        env:
          SUPABASE_PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF }}
          WEBHOOK_SECRET: ${{ secrets.WEBHOOK_SECRET }}
          EDGE_ORIGIN_SECRET: ${{ secrets.EDGE_ORIGIN_SECRET }}
          EDGE_FUNCTION_NAMESPACE: ${{ secrets.EDGE_FUNCTION_NAMESPACE }}
        run: |
          function_namespace="n${EDGE_FUNCTION_NAMESPACE}"
          response="$(curl -sS -w '\n%{http_code}' \
            -X POST "https://${SUPABASE_PROJECT_REF}.supabase.co/functions/v1/${function_namespace}-api" \
            -H "content-type: application/json" \
            -H "x-healthcheck-secret: ${WEBHOOK_SECRET}" \
            -H "x-novae-origin-secret: ${EDGE_ORIGIN_SECRET}" \
            --data '{"action":"healthcheck","payload":{}}')"
          status="$(printf '%s' "$response" | tail -n 1)"
          if [ "$status" != "200" ]; then
            printf 'Failed to restore maintenance settings (HTTP %s)\n' "$status" >&2
            exit 1
          fi
