name: Deploy Frontend to Vercel

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - dev
    paths:
      - 'src/**'
      - 'cloudflare/**'
      - 'config/backend-actions.config.json'
      - 'config/issue-categories.config.json'
      - 'config/rate-limits.config.json'
      - 'public/**'
      - 'index.html'
      - 'package.json'
      - 'package-lock.json'
      - 'postcss.config.cjs'
      - 'tailwind.config.cjs'
      - 'tsconfig*.json'
      - 'vite.config.ts'
      - 'vercel.json'
      - 'scripts/generate-issue-categories.mjs'
      - 'scripts/generate-rate-limits.mjs'
      - 'scripts/generate-backend-actions.mjs'
      - 'scripts/issue-category-config.mjs'
      - '.github/workflows/deploy-frontend.yml'

concurrency:
  group: frontend-${{ github.ref }}
  cancel-in-progress: true

permissions:
  actions: read
  contents: read

jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    environment: ${{ github.ref_name == 'main' && 'production' || 'development' }}
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 2

      - uses: actions/setup-node@v7
        with:
          node-version: 24
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Cache node_modules
        uses: actions/cache@v6
        id: cache-node-modules
        with:
          path: node_modules
          key: node-modules-${{ runner.os }}-node24-${{ hashFiles('package-lock.json') }}

      - name: Install dependencies
        if: steps.cache-node-modules.outputs.cache-hit != 'true'
        run: npm ci --prefer-offline

      - name: Wait for matching backend deployment
        if: github.event_name == 'push'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          before="${{ github.event.before }}"
          if [ -z "$before" ] || ! git cat-file -e "$before^{commit}" 2>/dev/null; then
            before="HEAD^"
          fi
          if ! git diff --name-only "$before" "$GITHUB_SHA" | grep -Eq '^(supabase/|cloudflare/|config/|scripts/prepare-edge-functions\.mjs)'; then
            exit 0
          fi
          for attempt in $(seq 1 60); do
            status="$(gh run list --workflow deploy-backend.yml --commit "$GITHUB_SHA" --limit 1 --json status --jq '.[0].status // "waiting"')"
            conclusion="$(gh run list --workflow deploy-backend.yml --commit "$GITHUB_SHA" --limit 1 --json conclusion --jq '.[0].conclusion // ""')"
            if [ "$status" = "completed" ] && [ "$conclusion" = "success" ]; then
              exit 0
            fi
            if [ "$status" = "completed" ] && [ "$conclusion" != "success" ]; then
              echo "Matching backend deployment failed with conclusion: $conclusion" >&2
              exit 1
            fi
            sleep 10
          done
          echo "Timed out waiting for matching backend deployment." >&2
          exit 1

      - name: Validate deployment secrets
        env:
          VITE_FIREBASE_API_KEY: ${{ secrets.VITE_FIREBASE_API_KEY }}
          VITE_FIREBASE_AUTH_DOMAIN: ${{ secrets.VITE_FIREBASE_AUTH_DOMAIN }}
          VITE_FIREBASE_PROJECT_ID: ${{ secrets.VITE_FIREBASE_PROJECT_ID }}
          VITE_FIREBASE_APP_ID: ${{ secrets.VITE_FIREBASE_APP_ID }}
          VITE_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.VITE_FIREBASE_MESSAGING_SENDER_ID }}
          VITE_FIREBASE_VAPID_KEY: ${{ secrets.VITE_FIREBASE_VAPID_KEY }}
          VITE_GOOGLE_CLIENT_ID: ${{ secrets.VITE_GOOGLE_CLIENT_ID }}
          VITE_FIREBASE_APP_CHECK_ENABLED: ${{ secrets.VITE_FIREBASE_APP_CHECK_ENABLED }}
          VITE_RECAPTCHA_ENTERPRISE_SITE_KEY: ${{ secrets.VITE_RECAPTCHA_ENTERPRISE_SITE_KEY }}
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_PUBLISHABLE_KEY: ${{ secrets.VITE_SUPABASE_PUBLISHABLE_KEY }}
          VITE_API_BASE_URL: ${{ secrets.CLOUDFLARE_WORKER_URL }}
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF }}
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
        run: |
          missing=()
          for name in \
            VITE_FIREBASE_API_KEY \
            VITE_FIREBASE_AUTH_DOMAIN \
            VITE_FIREBASE_PROJECT_ID \
            VITE_FIREBASE_APP_ID \
            VITE_FIREBASE_MESSAGING_SENDER_ID \
            VITE_FIREBASE_VAPID_KEY \
            VITE_GOOGLE_CLIENT_ID \
            VITE_SUPABASE_URL \
            VITE_SUPABASE_PUBLISHABLE_KEY \
            VITE_API_BASE_URL \
            SUPABASE_ACCESS_TOKEN \
            SUPABASE_PROJECT_REF \
            VERCEL_TOKEN \
            VERCEL_ORG_ID \
            VERCEL_PROJECT_ID; do
            if [ -z "${!name}" ]; then
              missing+=("$name")
            fi
          done

          if [ "${#missing[@]}" -gt 0 ]; then
            printf 'Missing deployment secrets: %s\n' "${missing[*]}" >&2
            exit 1
          fi

      - name: Pull Vercel Project Info
        run: npx -y vercel@56.2.1 pull --yes --environment=${{ github.ref_name == 'main' && 'production' || 'preview' }} --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

      - name: Build Project Artifacts
        run: npx -y vercel@56.2.1 build ${{ github.ref_name == 'main' && '--prod' || '' }} --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
          VITE_SCHOOL_NAME: ${{ secrets.VITE_SCHOOL_NAME }}
          VITE_ALLOWED_DOMAIN: ${{ secrets.VITE_ALLOWED_DOMAIN }}
          VITE_FIREBASE_API_KEY: ${{ secrets.VITE_FIREBASE_API_KEY }}
          VITE_FIREBASE_AUTH_DOMAIN: ${{ secrets.VITE_FIREBASE_AUTH_DOMAIN }}
          VITE_FIREBASE_PROJECT_ID: ${{ secrets.VITE_FIREBASE_PROJECT_ID }}
          VITE_FIREBASE_APP_ID: ${{ secrets.VITE_FIREBASE_APP_ID }}
          VITE_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.VITE_FIREBASE_MESSAGING_SENDER_ID }}
          VITE_FIREBASE_VAPID_KEY: ${{ secrets.VITE_FIREBASE_VAPID_KEY }}
          VITE_GOOGLE_CLIENT_ID: ${{ secrets.VITE_GOOGLE_CLIENT_ID }}
          VITE_FIREBASE_APP_CHECK_ENABLED: ${{ secrets.VITE_FIREBASE_APP_CHECK_ENABLED }}
          VITE_RECAPTCHA_ENTERPRISE_SITE_KEY: ${{ secrets.VITE_RECAPTCHA_ENTERPRISE_SITE_KEY }}
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_PUBLISHABLE_KEY: ${{ secrets.VITE_SUPABASE_PUBLISHABLE_KEY }}
          VITE_API_BASE_URL: ${{ secrets.CLOUDFLARE_WORKER_URL }}

      - name: Deploy Project Artifacts to Vercel
        run: npx -y vercel@56.2.1 deploy --prebuilt ${{ github.ref_name == 'main' && '--prod' || '' }} --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}

      - name: Retire legacy Edge Function entrypoints
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF }}
        run: |
          deployed="$(npx supabase functions list --project-ref "$SUPABASE_PROJECT_REF" --output json)"
          for name in backendAction syncUser cloudinaryWebhook outboxWorker processDeletionJobs maintenanceCleanup; do
            if printf '%s' "$deployed" | node -e "let input=''; process.stdin.on('data',(chunk)=>input+=chunk); process.stdin.on('end',()=>{ const rows=JSON.parse(input); process.exit(rows.some((row)=>row.name===process.argv[1]) ? 0 : 1); });" "$name"; then
              npx supabase functions delete "$name" --project-ref "$SUPABASE_PROJECT_REF" --yes
            fi
          done
