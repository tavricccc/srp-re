name: Deploy Supabase Backend

on:
  push:
    branches:
      - main
      - dev
    paths:
      - 'supabase/**'
      - 'cloudflare/**'
      - 'config/**'
      - 'scripts/prepare-edge-functions.mjs'
      - 'scripts/sync-supabase-firebase-auth.mjs'
      - '.github/workflows/deploy-backend.yml'
  workflow_dispatch:

concurrency:
  group: backend-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  deploy_backend:
    runs-on: ubuntu-latest
    environment: ${{ github.ref_name == 'main' && 'production' || 'development' }}
    env:
      # config.toml resolves this for every Supabase CLI command in the job.
      FIREBASE_PROJECT_ID: ${{ secrets.VITE_FIREBASE_PROJECT_ID || secrets.FIREBASE_PROJECT_ID }}
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v7
        with:
          node-version: 24
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Cache node_modules
        uses: actions/cache@v6
        id: cache-node-modules
        with:
          path: node_modules
          key: node-modules-${{ runner.os }}-node24-${{ hashFiles('package-lock.json') }}

      - name: Install dependencies
        if: steps.cache-node-modules.outputs.cache-hit != 'true'
        run: npm ci --prefer-offline

      - name: Verify backend architecture
        run: |
          npm run generate:all
          git diff --exit-code
          npm run check:worker
          npm run check:edge
          npm run test:architecture

      - uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x

      - name: Verify local database, permissions, and Edge workflows
        run: npm run verify:integration

      - uses: supabase/setup-cli@v3
        with:
          version: 2.109.1

      - name: Validate Supabase deployment secrets
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF }}
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
          APP_SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          FIREBASE_PROJECT_ID: ${{ secrets.VITE_FIREBASE_PROJECT_ID || secrets.FIREBASE_PROJECT_ID }}
          FIREBASE_WEB_API_KEY: ${{ secrets.FIREBASE_WEB_API_KEY }}
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
          ALLOWED_DOMAIN: ${{ secrets.ALLOWED_DOMAIN }}
          # Bootstrap-only; live authorization comes from RBAC assignments.
          ADMIN_EMAILS: ${{ secrets.ADMIN_EMAILS }}
          CLOUDINARY_CLOUD_NAME: ${{ secrets.CLOUDINARY_CLOUD_NAME }}
          CLOUDINARY_API_KEY: ${{ secrets.CLOUDINARY_API_KEY }}
          CLOUDINARY_API_SECRET: ${{ secrets.CLOUDINARY_API_SECRET }}
          CLOUDINARY_WEBHOOK_SECRET: ${{ secrets.CLOUDINARY_WEBHOOK_SECRET }}
          WEBHOOK_SECRET: ${{ secrets.WEBHOOK_SECRET }}
          EDGE_ORIGIN_SECRET: ${{ secrets.EDGE_ORIGIN_SECRET }}
          EDGE_FUNCTION_NAMESPACE: ${{ secrets.EDGE_FUNCTION_NAMESPACE }}
          CLOUDFLARE_WORKER_URL: ${{ secrets.CLOUDFLARE_WORKER_URL }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          ALLOWED_ORIGINS: ${{ secrets.ALLOWED_ORIGINS }}
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
          NOTION_DATABASE_ID: ${{ secrets.NOTION_DATABASE_ID }}
          NOTION_DATA_SOURCE_ID: ${{ secrets.NOTION_DATA_SOURCE_ID }}
          UPSTASH_REDIS_REST_URL: ${{ secrets.UPSTASH_REDIS_REST_URL }}
          UPSTASH_REDIS_REST_TOKEN: ${{ secrets.UPSTASH_REDIS_REST_TOKEN }}
        run: |
          missing=()
          for name in \
            SUPABASE_ACCESS_TOKEN \
            SUPABASE_PROJECT_REF \
            SUPABASE_DB_PASSWORD \
            APP_SUPABASE_SERVICE_ROLE_KEY \
            FIREBASE_PROJECT_ID \
            FIREBASE_WEB_API_KEY \
            GOOGLE_SERVICE_ACCOUNT_JSON \
            ALLOWED_DOMAIN \
            ADMIN_EMAILS \
            CLOUDINARY_CLOUD_NAME \
            CLOUDINARY_API_KEY \
            CLOUDINARY_API_SECRET \
            CLOUDINARY_WEBHOOK_SECRET \
            WEBHOOK_SECRET \
            EDGE_ORIGIN_SECRET \
            EDGE_FUNCTION_NAMESPACE \
            CLOUDFLARE_WORKER_URL \
            CLOUDFLARE_API_TOKEN \
            CLOUDFLARE_ACCOUNT_ID \
            ALLOWED_ORIGINS \
            UPSTASH_REDIS_REST_URL \
            UPSTASH_REDIS_REST_TOKEN; do
            if [ -z "${!name}" ]; then
              missing+=("$name")
            fi
          done

          if [ "${#missing[@]}" -gt 0 ]; then
            printf 'Missing Supabase backend secrets: %s\n' "${missing[*]}" >&2
            exit 1
          fi

          if { [ -n "$NOTION_TOKEN" ] && [ -z "$NOTION_DATABASE_ID" ]; } || \
             { [ -z "$NOTION_TOKEN" ] && [ -n "$NOTION_DATABASE_ID" ]; }; then
            echo 'NOTION_TOKEN and NOTION_DATABASE_ID must either both be set or both be omitted.' >&2
            exit 1
          fi

          if [ -n "$NOTION_DATA_SOURCE_ID" ] && \
             { [ -z "$NOTION_TOKEN" ] || [ -z "$NOTION_DATABASE_ID" ]; }; then
            echo 'NOTION_DATA_SOURCE_ID requires NOTION_TOKEN and NOTION_DATABASE_ID.' >&2
            exit 1
          fi

      - name: Link Supabase project
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
          SUPABASE_PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF }}
        run: supabase link --project-ref "$SUPABASE_PROJECT_REF"

      - name: Synchronize Firebase third-party authentication
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF }}
          FIREBASE_PROJECT_ID: ${{ secrets.VITE_FIREBASE_PROJECT_ID || secrets.FIREBASE_PROJECT_ID }}
        run: node scripts/sync-supabase-firebase-auth.mjs

      - name: Push database migrations
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
        run: supabase db push

      - name: Set Edge Function secrets
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          APP_SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          FIREBASE_PROJECT_ID: ${{ secrets.VITE_FIREBASE_PROJECT_ID || secrets.FIREBASE_PROJECT_ID }}
          FIREBASE_WEB_API_KEY: ${{ secrets.FIREBASE_WEB_API_KEY }}
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
          ALLOWED_DOMAIN: ${{ secrets.ALLOWED_DOMAIN }}
          # Bootstrap-only; live authorization comes from RBAC assignments.
          ADMIN_EMAILS: ${{ secrets.ADMIN_EMAILS }}
          CLOUDINARY_CLOUD_NAME: ${{ secrets.CLOUDINARY_CLOUD_NAME }}
          CLOUDINARY_API_KEY: ${{ secrets.CLOUDINARY_API_KEY }}
          CLOUDINARY_API_SECRET: ${{ secrets.CLOUDINARY_API_SECRET }}
          CLOUDINARY_WEBHOOK_SECRET: ${{ secrets.CLOUDINARY_WEBHOOK_SECRET }}
          WEBHOOK_SECRET: ${{ secrets.WEBHOOK_SECRET }}
          EDGE_ORIGIN_SECRET: ${{ secrets.EDGE_ORIGIN_SECRET }}
          EDGE_FUNCTION_NAMESPACE: ${{ secrets.EDGE_FUNCTION_NAMESPACE }}
          CLOUDFLARE_WORKER_URL: ${{ secrets.CLOUDFLARE_WORKER_URL }}
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
          # 提案與設備共用這個 Database，不建立設備專用 secret。
          NOTION_DATABASE_ID: ${{ secrets.NOTION_DATABASE_ID }}
          # Database 有多個 data source 時必填；單一 data source 可由 API 自動探索。
          NOTION_DATA_SOURCE_ID: ${{ secrets.NOTION_DATA_SOURCE_ID }}
          UPSTASH_REDIS_REST_URL: ${{ secrets.UPSTASH_REDIS_REST_URL }}
          UPSTASH_REDIS_REST_TOKEN: ${{ secrets.UPSTASH_REDIS_REST_TOKEN }}
        run: |
          notion_enabled=false
          notion_secrets=()
          if [ -n "$NOTION_TOKEN" ] && [ -n "$NOTION_DATABASE_ID" ]; then
            notion_enabled=true
            notion_secrets+=(
              "NOTION_TOKEN=$NOTION_TOKEN"
              "NOTION_DATABASE_ID=$NOTION_DATABASE_ID"
            )
            if [ -n "$NOTION_DATA_SOURCE_ID" ]; then
              notion_secrets+=("NOTION_DATA_SOURCE_ID=$NOTION_DATA_SOURCE_ID")
            fi
          fi

          supabase secrets set \
            APP_SUPABASE_SERVICE_ROLE_KEY="$APP_SUPABASE_SERVICE_ROLE_KEY" \
            FIREBASE_PROJECT_ID="$FIREBASE_PROJECT_ID" \
            FIREBASE_WEB_API_KEY="$FIREBASE_WEB_API_KEY" \
            GOOGLE_SERVICE_ACCOUNT_JSON="$GOOGLE_SERVICE_ACCOUNT_JSON" \
            ALLOWED_DOMAIN="$ALLOWED_DOMAIN" \
            ADMIN_EMAILS="$ADMIN_EMAILS" \
            CLOUDINARY_CLOUD_NAME="$CLOUDINARY_CLOUD_NAME" \
            CLOUDINARY_API_KEY="$CLOUDINARY_API_KEY" \
            CLOUDINARY_API_SECRET="$CLOUDINARY_API_SECRET" \
            CLOUDINARY_WEBHOOK_SECRET="$CLOUDINARY_WEBHOOK_SECRET" \
            WEBHOOK_SECRET="$WEBHOOK_SECRET" \
            EDGE_ORIGIN_SECRET="$EDGE_ORIGIN_SECRET" \
            EDGE_FUNCTION_NAMESPACE="$EDGE_FUNCTION_NAMESPACE" \
            CLOUDFLARE_WORKER_URL="$CLOUDFLARE_WORKER_URL" \
            NOTION_ENABLED="$notion_enabled" \
            UPSTASH_REDIS_REST_URL="$UPSTASH_REDIS_REST_URL" \
            UPSTASH_REDIS_REST_TOKEN="$UPSTASH_REDIS_REST_TOKEN" \
            "${notion_secrets[@]}"

      - name: Deploy Edge Functions
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          EDGE_FUNCTION_NAMESPACE: ${{ secrets.EDGE_FUNCTION_NAMESPACE }}
        run: |
          names="$(node scripts/prepare-edge-functions.mjs prepare)"
          trap 'node scripts/prepare-edge-functions.mjs cleanup' EXIT
          supabase functions deploy $names --no-verify-jwt

      - name: Deploy Cloudflare API Gateway
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          ALLOWED_ORIGINS: ${{ secrets.ALLOWED_ORIGINS }}
          CLOUDINARY_WEBHOOK_SECRET: ${{ secrets.CLOUDINARY_WEBHOOK_SECRET }}
          EDGE_FUNCTION_NAMESPACE: ${{ secrets.EDGE_FUNCTION_NAMESPACE }}
          EDGE_ORIGIN_SECRET: ${{ secrets.EDGE_ORIGIN_SECRET }}
          FIREBASE_PROJECT_ID: ${{ secrets.VITE_FIREBASE_PROJECT_ID || secrets.FIREBASE_PROJECT_ID }}
          SUPABASE_FUNCTIONS_BASE_URL: https://${{ secrets.SUPABASE_PROJECT_REF }}.supabase.co/functions/v1
        run: |
          environment="${{ github.ref_name == 'main' && 'production' || 'development' }}"
          node -e "const fs=require('node:fs'); const keys=['ALLOWED_ORIGINS','CLOUDINARY_WEBHOOK_SECRET','EDGE_FUNCTION_NAMESPACE','EDGE_ORIGIN_SECRET','FIREBASE_PROJECT_ID','SUPABASE_FUNCTIONS_BASE_URL']; fs.writeFileSync('/tmp/novae-worker-secrets.json', JSON.stringify(Object.fromEntries(keys.map((key) => [key, process.env[key]]))))"
          npx -y wrangler@4.111.0 deploy --config cloudflare/wrangler.toml --env "$environment"
          npx -y wrangler@4.111.0 secret bulk /tmp/novae-worker-secrets.json --config cloudflare/wrangler.toml --env "$environment"
          for obsolete_key in UPSTASH_REDIS_REST_TOKEN UPSTASH_REDIS_REST_URL; do
            npx -y wrangler@4.111.0 secret delete "$obsolete_key" --config cloudflare/wrangler.toml --env "$environment" >/dev/null 2>&1 || true
          done
          npx -y wrangler@4.111.0 deploy --config cloudflare/wrangler.toml --env "$environment"
          rm -f /tmp/novae-worker-secrets.json

      - name: Smoke test Cloudflare API Gateway
        env:
          ALLOWED_ORIGINS: ${{ secrets.ALLOWED_ORIGINS }}
          CLOUDFLARE_WORKER_URL: ${{ secrets.CLOUDFLARE_WORKER_URL }}
        run: |
          origin="${ALLOWED_ORIGINS%%,*}"
          for attempt in $(seq 1 12); do
            status="$(curl -sS -o /tmp/worker-smoke.json -w '%{http_code}' \
              -X POST "${CLOUDFLARE_WORKER_URL%/}/v1/actions" \
              -H "content-type: application/json" \
              -H "origin: ${origin}" \
              --data '{"action":"getCurrentUserRole","payload":{}}')"
            if [ "$status" = "401" ]; then
              exit 0
            fi
            if [ "$status" = "403" ] && grep -q '"code":"origin-denied"' /tmp/worker-smoke.json; then
              sleep 5
              continue
            fi
            if [ "$status" -lt 500 ]; then
              break
            fi
            sleep 5
          done
          printf 'Cloudflare API Gateway smoke test failed with HTTP %s: %s\n' "$status" "$(cat /tmp/worker-smoke.json)" >&2
          exit 1

      - name: Smoke test API origin deployment
        env:
          SUPABASE_PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF }}
          WEBHOOK_SECRET: ${{ secrets.WEBHOOK_SECRET }}
          EDGE_ORIGIN_SECRET: ${{ secrets.EDGE_ORIGIN_SECRET }}
          EDGE_FUNCTION_NAMESPACE: ${{ secrets.EDGE_FUNCTION_NAMESPACE }}
        run: |
          function_namespace="n${EDGE_FUNCTION_NAMESPACE}"
          response="$(curl -sS -w '\n%{http_code}' \
            -X POST "https://${SUPABASE_PROJECT_REF}.supabase.co/functions/v1/${function_namespace}-api" \
            -H "content-type: application/json" \
            -H "x-healthcheck-secret: ${WEBHOOK_SECRET}" \
            -H "x-reconcile-config: true" \
            -H "x-novae-origin-secret: ${EDGE_ORIGIN_SECRET}" \
            --data '{"action":"healthcheck","payload":{}}')"
          status="$(printf '%s' "$response" | tail -n 1)"
          body="$(printf '%s' "$response" | sed '$d')"
          printf 'backendAction healthcheck response: %s\n' "$body"
          if [ "$status" != "200" ] || ! printf '%s' "$body" | grep -q '"ok":true'; then
            printf 'backendAction healthcheck failed with HTTP %s\n' "$status" >&2
            exit 1
          fi

      - name: Run maintenance cleanup
        env:
          SUPABASE_PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF }}
          WEBHOOK_SECRET: ${{ secrets.WEBHOOK_SECRET }}
          EDGE_ORIGIN_SECRET: ${{ secrets.EDGE_ORIGIN_SECRET }}
          EDGE_FUNCTION_NAMESPACE: ${{ secrets.EDGE_FUNCTION_NAMESPACE }}
        run: |
          function_namespace="n${EDGE_FUNCTION_NAMESPACE}"
          response="$(curl -sS -w '\n%{http_code}' \
            -X POST "https://${SUPABASE_PROJECT_REF}.supabase.co/functions/v1/${function_namespace}-maintenance" \
            -H "content-type: application/json" \
            -H "authorization: Bearer ${WEBHOOK_SECRET}" \
            -H "x-novae-origin-secret: ${EDGE_ORIGIN_SECRET}" \
            --data '{"signal":"post_deploy"}')"
          status="$(printf '%s' "$response" | tail -n 1)"
          body="$(printf '%s' "$response" | sed '$d')"
          printf 'maintenance cleanup response: %s\n' "$body"
          if [ "$status" != "200" ] || ! printf '%s' "$body" | grep -q '"ok":true'; then
            printf 'maintenance cleanup failed with HTTP %s\n' "$status" >&2
            exit 1
          fi
