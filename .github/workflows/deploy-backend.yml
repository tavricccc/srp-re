name: Deploy Supabase Backend

on:
  push:
    branches:
      - main
      - dev
    paths:
      - 'supabase/**'
      - 'config/**'
      - '.github/workflows/deploy-backend.yml'
  workflow_dispatch:

concurrency:
  group: backend-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  deploy_backend:
    runs-on: ubuntu-latest
    environment: ${{ github.ref_name == 'main' && 'production' || 'development' }}
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Cache node_modules
        uses: actions/cache@v6
        id: cache-node-modules
        with:
          path: node_modules
          key: node-modules-${{ runner.os }}-node24-${{ hashFiles('package-lock.json') }}

      - name: Install dependencies
        if: steps.cache-node-modules.outputs.cache-hit != 'true'
        run: npm ci --prefer-offline

      - name: Verify backend architecture
        run: |
          npm run generate:all
          git diff --exit-code
          npm run check:edge
          npm run test:architecture

      - uses: supabase/setup-cli@v1
        with:
          version: 2.109.0

      - name: Validate Supabase deployment secrets
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF }}
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
          APP_SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          FIREBASE_PROJECT_ID: ${{ secrets.VITE_FIREBASE_PROJECT_ID || secrets.FIREBASE_PROJECT_ID }}
          FIREBASE_WEB_API_KEY: ${{ secrets.FIREBASE_WEB_API_KEY }}
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
          ALLOWED_DOMAIN: ${{ secrets.ALLOWED_DOMAIN }}
          ADMIN_EMAILS: ${{ secrets.ADMIN_EMAILS }}
          CLOUDINARY_CLOUD_NAME: ${{ secrets.CLOUDINARY_CLOUD_NAME }}
          CLOUDINARY_API_KEY: ${{ secrets.CLOUDINARY_API_KEY }}
          CLOUDINARY_API_SECRET: ${{ secrets.CLOUDINARY_API_SECRET }}
          CLOUDINARY_WEBHOOK_SECRET: ${{ secrets.CLOUDINARY_WEBHOOK_SECRET }}
          WEBHOOK_SECRET: ${{ secrets.WEBHOOK_SECRET }}
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
          NOTION_DATABASE_ID: ${{ secrets.NOTION_DATABASE_ID }}
          UPSTASH_REDIS_REST_URL: ${{ secrets.UPSTASH_REDIS_REST_URL }}
          UPSTASH_REDIS_REST_TOKEN: ${{ secrets.UPSTASH_REDIS_REST_TOKEN }}
        run: |
          missing=()
          for name in \
            SUPABASE_ACCESS_TOKEN \
            SUPABASE_PROJECT_REF \
            SUPABASE_DB_PASSWORD \
            APP_SUPABASE_SERVICE_ROLE_KEY \
            FIREBASE_PROJECT_ID \
            FIREBASE_WEB_API_KEY \
            GOOGLE_SERVICE_ACCOUNT_JSON \
            ALLOWED_DOMAIN \
            ADMIN_EMAILS \
            CLOUDINARY_CLOUD_NAME \
            CLOUDINARY_API_KEY \
            CLOUDINARY_API_SECRET \
            CLOUDINARY_WEBHOOK_SECRET \
            WEBHOOK_SECRET \
            NOTION_TOKEN \
            NOTION_DATABASE_ID \
            UPSTASH_REDIS_REST_URL \
            UPSTASH_REDIS_REST_TOKEN; do
            if [ -z "${!name}" ]; then
              missing+=("$name")
            fi
          done

          if [ "${#missing[@]}" -gt 0 ]; then
            printf 'Missing Supabase backend secrets: %s\n' "${missing[*]}" >&2
            exit 1
          fi

      - name: Link Supabase project
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
          SUPABASE_PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF }}
        run: supabase link --project-ref "$SUPABASE_PROJECT_REF"

      - name: Push database migrations
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
        run: supabase db push

      - name: Set Edge Function secrets
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          APP_SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          FIREBASE_PROJECT_ID: ${{ secrets.VITE_FIREBASE_PROJECT_ID || secrets.FIREBASE_PROJECT_ID }}
          FIREBASE_WEB_API_KEY: ${{ secrets.FIREBASE_WEB_API_KEY }}
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
          ALLOWED_DOMAIN: ${{ secrets.ALLOWED_DOMAIN }}
          ADMIN_EMAILS: ${{ secrets.ADMIN_EMAILS }}
          CLOUDINARY_CLOUD_NAME: ${{ secrets.CLOUDINARY_CLOUD_NAME }}
          CLOUDINARY_API_KEY: ${{ secrets.CLOUDINARY_API_KEY }}
          CLOUDINARY_API_SECRET: ${{ secrets.CLOUDINARY_API_SECRET }}
          CLOUDINARY_WEBHOOK_SECRET: ${{ secrets.CLOUDINARY_WEBHOOK_SECRET }}
          WEBHOOK_SECRET: ${{ secrets.WEBHOOK_SECRET }}
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
          NOTION_VERSION: ${{ secrets.NOTION_VERSION || '2022-06-28' }}
          NOTION_DATABASE_ID: ${{ secrets.NOTION_DATABASE_ID }}
          UPSTASH_REDIS_REST_URL: ${{ secrets.UPSTASH_REDIS_REST_URL }}
          UPSTASH_REDIS_REST_TOKEN: ${{ secrets.UPSTASH_REDIS_REST_TOKEN }}
        run: |
          supabase secrets set \
            APP_SUPABASE_SERVICE_ROLE_KEY="$APP_SUPABASE_SERVICE_ROLE_KEY" \
            FIREBASE_PROJECT_ID="$FIREBASE_PROJECT_ID" \
            FIREBASE_WEB_API_KEY="$FIREBASE_WEB_API_KEY" \
            GOOGLE_SERVICE_ACCOUNT_JSON="$GOOGLE_SERVICE_ACCOUNT_JSON" \
            ALLOWED_DOMAIN="$ALLOWED_DOMAIN" \
            ADMIN_EMAILS="$ADMIN_EMAILS" \
            CLOUDINARY_CLOUD_NAME="$CLOUDINARY_CLOUD_NAME" \
            CLOUDINARY_API_KEY="$CLOUDINARY_API_KEY" \
            CLOUDINARY_API_SECRET="$CLOUDINARY_API_SECRET" \
            CLOUDINARY_WEBHOOK_SECRET="$CLOUDINARY_WEBHOOK_SECRET" \
            WEBHOOK_SECRET="$WEBHOOK_SECRET" \
            NOTION_TOKEN="$NOTION_TOKEN" \
            NOTION_VERSION="$NOTION_VERSION" \
            NOTION_DATABASE_ID="$NOTION_DATABASE_ID" \
            UPSTASH_REDIS_REST_URL="$UPSTASH_REDIS_REST_URL" \
            UPSTASH_REDIS_REST_TOKEN="$UPSTASH_REDIS_REST_TOKEN"

      - name: Deploy Edge Functions
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: |
          supabase functions deploy syncUser
          supabase functions deploy backendAction
          supabase functions deploy cloudinaryWebhook
          supabase functions deploy outboxWorker
          supabase functions deploy processDeletionJobs
          supabase functions deploy maintenanceCleanup

      - name: Smoke test backendAction deployment
        env:
          SUPABASE_PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF }}
          WEBHOOK_SECRET: ${{ secrets.WEBHOOK_SECRET }}
        run: |
          response="$(curl -sS -w '\n%{http_code}' \
            -X POST "https://${SUPABASE_PROJECT_REF}.supabase.co/functions/v1/backendAction" \
            -H "content-type: application/json" \
            -H "x-healthcheck-secret: ${WEBHOOK_SECRET}" \
            --data '{"action":"healthcheck","payload":{}}')"
          status="$(printf '%s' "$response" | tail -n 1)"
          body="$(printf '%s' "$response" | sed '$d')"
          printf 'backendAction healthcheck response: %s\n' "$body"
          if [ "$status" != "200" ] || ! printf '%s' "$body" | grep -q '"ok":true'; then
            printf 'backendAction healthcheck failed with HTTP %s\n' "$status" >&2
            exit 1
          fi

      - name: Run maintenance cleanup
        env:
          SUPABASE_PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF }}
          WEBHOOK_SECRET: ${{ secrets.WEBHOOK_SECRET }}
        run: |
          response="$(curl -sS -w '\n%{http_code}' \
            -X POST "https://${SUPABASE_PROJECT_REF}.supabase.co/functions/v1/maintenanceCleanup" \
            -H "content-type: application/json" \
            -H "authorization: Bearer ${WEBHOOK_SECRET}" \
            --data '{"signal":"post_deploy"}')"
          status="$(printf '%s' "$response" | tail -n 1)"
          body="$(printf '%s' "$response" | sed '$d')"
          printf 'maintenance cleanup response: %s\n' "$body"
          if [ "$status" != "200" ] || ! printf '%s' "$body" | grep -q '"ok":true'; then
            printf 'maintenance cleanup failed with HTTP %s\n' "$status" >&2
            exit 1
          fi
